[SETTINGS]
 ; Cheat string that resets phone ui and assets
FIX_CHEAT_STRING=fixphonehud

; Fixes phone audio after fixing hud
AUDIO_FIX_ENABLED=true
AUDIO_FIX_DELAY_MS=900

; Pins phone UI assets so they stay loaded
PIN_PHONE_ASSETS_ENABLED=true

; Event-driven blip refresh after phone closes
REFRESH_BLIPS_ON_PHONE_CLOSE_ENABLED=true
BLIP_REFRESH_BATCH_SIZE=24
BLIP_REFRESH_PASSES_ON_PHONE_CLOSE=6

; How often script rebuilds the internal blip list (Default 3000)
; (lower = more responsive, higher = less allocation)
BLIP_CACHE_REBUILD_INTERVAL_MS=3000

; Refreshes blips whenever a mission ends
blipsOnMissionEnd=true

; ========= Logging =========
LOG_ENABLED=false
; 0=errors only, 1=info, 2=debug 
LOG_LEVEL=1
LOG_RESET_ON_START=true
LOG_FILE_NAME=PhoneHudFix.log